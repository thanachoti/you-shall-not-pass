version: '3.8'
services:
  mongodb:
    image: "mongo:5.0"
    volumes:
      - mongodb_data:/data/db

  opensearch:
    image: "opensearchproject/opensearch:2.11.0"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "action.auto_create_index=false"
      - "plugins.security.disabled=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - os_data:/usr/share/opensearch/data

  graylog:
    image: "graylog/graylog:5.2"
    environment:
      - GRAYLOG_NODE_ID_FILE=/usr/share/graylog/data/config/node-id
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepper12345678901234567890
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918 # พาสเวิร์ดคือ admin
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    ports:
      - "9000:9000"   # Graylog Web Interface
      - "1514:1514/udp" # Syslog UDP Input
      - "12201:12201/udp" # GELF UDP Input
    depends_on:
      - mongodb
      - opensearch
    volumes:
      - graylog_data:/usr/share/graylog/data

volumes:
  mongodb_data:
  os_data:
  graylog_data: